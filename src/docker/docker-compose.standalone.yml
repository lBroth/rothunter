# RotHunter standalone stack — pulls pre-built images, no clone needed.
#
# One-liner from any directory you want to scan:
#
#   curl -fsSL https://raw.githubusercontent.com/lBroth/rothunter/main/src/docker/docker-compose.standalone.yml \
#     -o rothunter-compose.yml
#   ROTHUNTER_WORKSPACE_HOST=$(pwd) docker compose -f rothunter-compose.yml up
#
# Or via process substitution (single command, no file left behind):
#
#   curl -fsSL https://raw.githubusercontent.com/lBroth/rothunter/main/src/docker/docker-compose.standalone.yml \
#     | ROTHUNTER_WORKSPACE_HOST=$(pwd) docker compose -f - up
#
# Then open http://localhost:3000. The llama.cpp sidecar downloads
# ~9 GB of weights on first boot and pins them to the
# `rothunter-models` named volume so subsequent runs start in seconds.
#
# The companion file `docker-compose.yml` (next to this one) is for
# developers who clone the repo — it builds the rothunter image from
# source. Use this one for everyone else.

services:
  rothunter-llm:
    # CPU image by default — runs on macOS / Linux / Windows without GPU
    # drivers. ~3-15 s per LLM verdict on a modern laptop. For NVIDIA
    # GPUs swap to `ghcr.io/ggml-org/llama.cpp:server-cuda` and uncomment
    # the deploy.resources block below.
    image: ghcr.io/ggml-org/llama.cpp:server
    command: >
      --hf-repo bartowski/Qwen2.5-Coder-14B-Instruct-GGUF
      --hf-file Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf
      --port 8080
      --host 0.0.0.0
      --jinja
      -c 8192
      -n 256
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
    volumes:
      # llama.cpp's --hf-repo downloads via HF Hub which caches under
      # ~/.cache/huggingface (NOT ~/.cache/llama.cpp). Mounting the wrong
      # path silently forces a re-download every time the container is
      # recreated — model is ~9 GB.
      - rothunter-models:/root/.cache/huggingface
    expose:
      - '8080'
    ports:
      - '8080:8080'
    # Uncomment when running with NVIDIA GPUs (image swap above too):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:8080/health']
      interval: 5s
      timeout: 3s
      retries: 60

  rothunter:
    # Published GHCR image — no clone required. Tags follow npm: `latest`,
    # `next` (rc / pre-release), or pin to a specific version (`1.1.0-rc.2`).
    image: ghcr.io/lbroth/rothunter:latest
    depends_on:
      rothunter-llm:
        condition: service_healthy
    environment:
      ROTHUNTER_LLM_BASE_URL: http://rothunter-llm:8080/v1
      ROTHUNTER_LLM_MODEL: bartowski/Qwen2.5-Coder-14B-Instruct-GGUF
      ROTHUNTER_WORKSPACE: /workspace
    volumes:
      # Mounts the directory the operator wants to scan. Default `$(pwd)`
      # via the env var below; override with any absolute path.
      - ${ROTHUNTER_WORKSPACE_HOST:-./}:/workspace:rw
    ports:
      - '3000:3000'

volumes:
  rothunter-models:
