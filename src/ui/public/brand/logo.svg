<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    Pixel "R" alone, transparent background.
    Pastel severity palette:
      mint / sage  → healthy
      amber        → warning
      coral        → high
      rose         → critical (rot tile, crosshair-targeted)
  -->
  <defs>
    <linearGradient id="tMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="tSage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="tAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="tCoral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fda4af"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="tRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fecdd3"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="dp6" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rotG6" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    R grid — 7 rows × 5 cols, 22px tiles, 2px gap → 24 stride.
    Origin x=68, y=44. Pattern:
      row 0:  ■ ■ ■ ■ .
      row 1:  ■ . . . ■
      row 2:  ■ . . . ■
      row 3:  ■ ■ ■ ■ .
      row 4:  ■ . ■ . .
      row 5:  ■ . . ■ .
      row 6:  ■ . . . R   (R = rot, red)
  -->
  <g filter="url(#dp6)">
    <!-- Row 0. -->
    <rect x="68"  y="44"  width="22" height="22" rx="4" fill="url(#tMint)"/>
    <rect x="92"  y="44"  width="22" height="22" rx="4" fill="url(#tMint)"/>
    <rect x="116" y="44"  width="22" height="22" rx="4" fill="url(#tSage)"/>
    <rect x="140" y="44"  width="22" height="22" rx="4" fill="url(#tSage)"/>
    <!-- Row 1. -->
    <rect x="68"  y="68"  width="22" height="22" rx="4" fill="url(#tMint)"/>
    <rect x="164" y="68"  width="22" height="22" rx="4" fill="url(#tAmber)"/>
    <!-- Row 2. -->
    <rect x="68"  y="92"  width="22" height="22" rx="4" fill="url(#tSage)"/>
    <rect x="164" y="92"  width="22" height="22" rx="4" fill="url(#tAmber)"/>
    <!-- Row 3 — mid bar. -->
    <rect x="68"  y="116" width="22" height="22" rx="4" fill="url(#tSage)"/>
    <rect x="92"  y="116" width="22" height="22" rx="4" fill="url(#tAmber)"/>
    <rect x="116" y="116" width="22" height="22" rx="4" fill="url(#tAmber)"/>
    <rect x="140" y="116" width="22" height="22" rx="4" fill="url(#tCoral)"/>
    <!-- Row 4. -->
    <rect x="68"  y="140" width="22" height="22" rx="4" fill="url(#tAmber)"/>
    <rect x="116" y="140" width="22" height="22" rx="4" fill="url(#tCoral)"/>
    <!-- Row 5. -->
    <rect x="68"  y="164" width="22" height="22" rx="4" fill="url(#tCoral)"/>
    <rect x="140" y="164" width="22" height="22" rx="4" fill="url(#tCoral)"/>
    <!-- Row 6 — stem base + ROT tile. -->
    <rect x="68"  y="188" width="22" height="22" rx="4" fill="url(#tCoral)"/>
    <g filter="url(#rotG6)">
      <rect x="164" y="188" width="22" height="22" rx="4" fill="url(#tRose)"/>
    </g>
  </g>

  <!-- Hunter crosshair on rot tile (centre 175, 199). -->
  <g stroke="#fb7185" stroke-width="2" stroke-linecap="round"
     fill="none" opacity="0.95" filter="url(#rotG6)">
    <line x1="175" y1="160" x2="175" y2="180"/>
    <line x1="175" y1="218" x2="175" y2="240"/>
    <line x1="194" y1="199" x2="222" y2="199"/>
    <line x1="156" y1="199" x2="148" y2="199"/>
    <circle cx="175" cy="199" r="20" stroke-dasharray="3 4"/>
  </g>
</svg>
