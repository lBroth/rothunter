name: Release

on:
  push:
    tags:
      - 'v*'

# Workflow-default = least privilege. Each job opts into the scopes
# it actually needs (id-token only on npm-publish for provenance,
# packages:write only on docker-publish for GHCR).
permissions:
  contents: read

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # First setup-node — install / test against the PUBLIC registry
      # WITHOUT an authenticated `.npmrc`. setup-node's `registry-url`
      # writes `//registry/:_authToken=${NODE_AUTH_TOKEN}`, and any
      # malformed token value 401s npm CI even on public-package
      # fetches; keep auth out of the install path entirely.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -- --ci
      - run: npm run build
      # Re-run setup-node JUST to (re)write `.npmrc` with the publish
      # registry + token. Scoped to the publish step's needs only.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner (GHCR requires lowercase repo names)
        id: lower
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: src/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/rothunter:${{ steps.tag.outputs.version }}
            ghcr.io/${{ steps.lower.outputs.owner }}/rothunter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
