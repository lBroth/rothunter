name: Release

on:
  push:
    tags:
      - 'v*'

# Workflow-default = least privilege. Each job opts into the scopes
# it actually needs (id-token only on npm-publish for provenance,
# packages:write only on docker-publish for GHCR).
permissions:
  contents: read

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # npm publish needs a valid `NPM_TOKEN` repo secret of type
    # "Automation" with publish rights on the package name. Until that's
    # in place the docker-publish job carries the release on its own,
    # so a missing/invalid token here does not block the rest of the
    # release workflow.
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # First setup-node — install / test against the PUBLIC registry
      # WITHOUT an authenticated `.npmrc`. setup-node's `registry-url`
      # writes `//registry/:_authToken=${NODE_AUTH_TOKEN}`, and any
      # malformed token value 401s npm CI even on public-package
      # fetches; keep auth out of the install path entirely.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -- --ci
      - run: npm run build
      # Re-run setup-node JUST to (re)write `.npmrc` with the publish
      # registry + token. Scoped to the publish step's needs only.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        # Pre-release tags (e.g. `1.0.0-rc.1`) MUST be published under
        # a non-`latest` dist-tag so they don't shadow the stable
        # release. Derive `next` for `-rc.*`, `beta` for `-beta.*`,
        # otherwise default to `latest`.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-rc.*|*-next.*) TAG=next ;;
            *-beta.*)        TAG=beta ;;
            *-alpha.*)       TAG=alpha ;;
            *)               TAG=latest ;;
          esac
          echo "Publishing $VERSION as dist-tag '$TAG'"
          npm publish --provenance --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner (GHCR requires lowercase repo names)
        id: lower
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: src/docker/Dockerfile
          # Apple Silicon hosts pulled `:latest` and got an amd64-only
          # manifest, forcing Rosetta emulation (~3× slower). Build a
          # multi-arch manifest so ARM hosts get a native image.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/rothunter:${{ steps.tag.outputs.version }}
            ghcr.io/${{ steps.lower.outputs.owner }}/rothunter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
