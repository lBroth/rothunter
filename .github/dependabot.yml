version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch:
        update-types: [patch]
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /src/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch:
        update-types: [patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
